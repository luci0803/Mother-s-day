<!DOCTYPE html>
<html>
<head>
<title>Anniversary</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.page{
display:none;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#p1{
display:flex;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
border-radius:10px;
border:none;
}

#yes{
background:green;
color:white;
}

#no{
background:red;
color:white;
position:absolute;
}

.final{
background:url("photo.jpg");
background-size:cover;
background-position:center;
color:white;
}

.box{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<audio id="music" src="song.mp3"></audio>


<div id="p1" class="page">

<div class="box">

<h1>Happy Anniversary ❤️</h1>
<h2>ARBAAZ 💗 AMATULLAH</h2>

<button onclick="show(2)">Start</button>
<button onclick="play()">Play Song</button>

</div>

</div>



<div id="p2" class="page">

<div class="box">

<h2>Do you still love me? ❤️</h2>

<button id="yes" onclick="show(3)">YES</button>
<button id="no">NO</button>

</div>

</div>



<div id="p3" class="page">

<div class="box">

<h1>Happy 1st Anniversary ❤️</h1>

<button onclick="show(4)">Next</button>

</div>

</div>



<div id="p4" class="page final">

<div class="box">

<h1>ARBAAZ 💗 AMATULLAH</h1>
<h2>Forever ❤️</h2>

</div>

</div>



<script>

function show(n){

document.getElementById("p1").style.display="none";
document.getElementById("p2").style.display="none";
document.getElementById("p3").style.display="none";
document.getElementById("p4").style.display="none";

document.getElementById("p"+n).style.display="flex";

}


document.getElementById("no").onmouseover=function(){

this.style.top=Math.random()*300+"px";
this.style.left=Math.random()*300+"px";

}


function play(){
document.getElementById("music").play();
}

</script>

</body>
</html>
